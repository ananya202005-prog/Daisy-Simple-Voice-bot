<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daisy - Voice Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <main class="container" aria-label="Daisy voice assistant">
        <section class="card">
            <h1 class="title">Daisy</h1>
            <p class="subtitle">Your Voice Assistant</p>

            <div class="orb-wrapper" id="orbWrapper" aria-hidden="true">
                <div class="orb-ring orb-ring-1"></div>
                <div class="orb-ring orb-ring-2"></div>
                <div class="orb-ring orb-ring-3"></div>
                <div class="orb" id="orb"></div>
            </div>

            <p class="status" id="status" aria-live="polite">Click Start to wake me up</p>

            <div class="button-group">
                <button class="btn btn-start" id="startBtn" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Start
                </button>
                <button class="btn btn-stop" id="stopBtn" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    Stop
                </button>
            </div>
        </section>
    </main>

    <script src="/static/script.js" defer></script>
</body>
</html>
